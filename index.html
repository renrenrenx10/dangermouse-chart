<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Danger Mouse — Demand Forecast</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 32px 16px;
    }
    h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    #status {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 24px;
    }
    #status.error { color: #c0392b; }
    #chartWrapper {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px;
      width: 100%;
      max-width: 960px;
    }
    canvas { width: 100% !important; }
  </style>
</head>
<body>
  <h1>Demand Forecast</h1>
  <div id="status">Loading data from SharePoint…</div>
  <div id="chartWrapper">
    <canvas id="demandChart" height="420"></canvas>
  </div>

  <script>
    // ── CONFIG ────────────────────────────────────────────────────────────────
    const SITE_URL   = "https://nuccol.sharepoint.com/sites/DangerMouse";
    const LIST_NAME  = "ChartCache";
    const ITEM_TITLE = "cache";
    // ── END CONFIG ────────────────────────────────────────────────────────────

    const palette = [
      '#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f',
      '#edc948','#b07aa1','#ff9da7','#9c755f','#bab0ac',
      '#1f77b4','#aec7e8','#ffbb78','#98df8a','#d62728'
    ];

    const status = document.getElementById('status');

    async function fetchChartData() {
      // SharePoint REST — uses the user's existing M365 browser session (cookie/MSAL)
      const url =
        `${SITE_URL}/_api/web/lists/getbytitle('${LIST_NAME}')/items` +
        `?$filter=Title eq '${ITEM_TITLE}'&$select=ChartData&$top=1`;

      const resp = await fetch(url, {
        credentials: 'include',          // send the M365 session cookie
        headers: { Accept: 'application/json;odata=nometadata' }
      });

      if (!resp.ok) {
        throw new Error(`SharePoint returned ${resp.status} ${resp.statusText}`);
      }

      const json = await resp.json();
      const items = json.value;
      if (!items || items.length === 0) {
        throw new Error('No cache item found — make sure the ChartCache list has a "cache" row.');
      }

      const raw = items[0].ChartData;
      if (!raw) {
        throw new Error('ChartData is empty — run "Generate Demand" in Power Apps first.');
      }

      return JSON.parse(raw);
    }

    function buildChart(data) {
      const years    = [...new Set(data.map(r => r.y))].sort();
      const products = [...new Set(data.map(r => r.p))].sort();

      const datasets = products.map((p, i) => ({
        label: p,
        backgroundColor: palette[i % palette.length],
        data: years.map(y => {
          const rows = data.filter(r => r.p === p && r.y === y);
          return rows.reduce((s, r) => s + (r.a || 0), 0);
        })
      }));

      new Chart(document.getElementById('demandChart').getContext('2d'), {
        type: 'bar',
        data: { labels: years, datasets },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'right' },
            title:  { display: false }
          },
          scales: {
            x: {
              title: { display: true, text: 'Year', font: { weight: 'bold' } },
              stacked: false
            },
            y: {
              title: { display: true, text: 'Amount', font: { weight: 'bold' } },
              beginAtZero: true
            }
          }
        }
      });
    }

    // ── MAIN ──────────────────────────────────────────────────────────────────
    (async () => {
      try {
        const data = await fetchChartData();
        status.textContent = `Loaded ${data.length} rows — last updated by Power Apps.`;
        buildChart(data);
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        status.classList.add('error');
        console.error(err);
      }
    })();
  </script>
</body>
</html>
